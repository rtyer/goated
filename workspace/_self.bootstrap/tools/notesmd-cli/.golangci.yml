version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - nilerr
  settings:
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - os.Setenv
        - os.Unsetenv
    staticcheck:
      checks:
        - "all"
        - "-ST1000"  # package comments — pre-existing
        - "-ST1003"  # naming (Uri/Url/Json → URI/URL/JSON) — pre-existing, would be breaking
        - "-ST1005"  # error string capitalisation — pre-existing constants

formatters:
  enable:
    - gofmt
